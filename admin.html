<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GSCICC | Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body class="h-full smooth-scroll bg-gray-50">

  <button class="dark-toggle" id="darkToggle" title="Toggle Dark Mode">🌙</button>

  <nav class="sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 py-4">
      <div class="flex flex-wrap justify-center items-center gap-4">
        <a href="index.html" class="text-yellow-400 hover:text-white transition-colors duration-300 font-medium text-sm px-3 py-1">Home</a>
        <a href="dashboard.html" class="text-yellow-400 hover:text-white transition-colors duration-300 font-medium text-sm px-3 py-1">Dashboard</a>
        <a href="admin.html" class="text-yellow-400 hover:text-white transition-colors duration-300 font-medium text-sm px-3 py-1">Admin</a>
        <button onclick="logOut()" class="bg-red-500 text-white hover:bg-red-600 transition-colors duration-300 font-bold text-sm px-4 py-2 rounded-lg">🚪 Logout</button>
      </div>
    </div>
  </nav>

  <!-- Admin Login -->
  <div id="admin-login" class="py-16 bg-gray-50">
    <div class="max-w-md mx-auto px-6">
      <div class="bg-white rounded-2xl shadow-xl p-8 border-t-4 border-red-500">
        <div class="text-center mb-6">
          <div class="w-16 h-16 mx-auto bg-red-100 rounded-full flex items-center justify-center text-3xl mb-3">🔐</div>
          <h2 class="text-2xl font-bold text-gray-800">Admin Login</h2>
          <p class="text-gray-500 text-sm mt-1">অ্যাডমিন পাসওয়ার্ড দিন</p>
        </div>
        <div>
          <input type="password" id="admin-password" placeholder="অ্যাডমিন পাসওয়ার্ড"
                 class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-red-400 focus:outline-none transition mb-4">
          <button onclick="adminLogin()" class="w-full bg-red-600 text-white font-bold py-3 rounded-lg hover:bg-red-500 transition-all">🔓 প্রবেশ করুন</button>
          <p id="admin-error" class="text-red-500 text-sm text-center mt-3 hidden">❌ ভুল পাসওয়ার্ড!</p>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="admin-panel" class="hidden">

    <div class="gradient-bg islamic-pattern py-10 text-center text-white">
      <h1 class="text-3xl font-bold text-yellow-400">🛡️ Admin Panel</h1>
      <p class="opacity-80 mt-2">সদস্য ব্যবস্থাপনা</p>
    </div>

    <!-- Stats -->
    <div class="max-w-6xl mx-auto px-6 py-8">
      <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
        <div class="bg-yellow-50 rounded-xl p-4 text-center border-2 border-yellow-200">
          <p class="text-3xl font-bold text-yellow-600" id="stat-pending">0</p>
          <p class="text-sm text-gray-600">⏳ Pending</p>
        </div>
        <div class="bg-green-50 rounded-xl p-4 text-center border-2 border-green-200">
          <p class="text-3xl font-bold text-green-600" id="stat-active">0</p>
          <p class="text-sm text-gray-600">✅ Active</p>
        </div>
        <div class="bg-red-50 rounded-xl p-4 text-center border-2 border-red-200">
          <p class="text-3xl font-bold text-red-600" id="stat-rejected">0</p>
          <p class="text-sm text-gray-600">❌ Rejected</p>
        </div>
        <div class="bg-blue-50 rounded-xl p-4 text-center border-2 border-blue-200">
          <p class="text-3xl font-bold text-blue-600" id="stat-total">0</p>
          <p class="text-sm text-gray-600">📊 Total</p>
        </div>
      </div>

      <!-- Filter -->
      <div class="flex flex-wrap gap-3 mb-6">
        <button onclick="filterMembers('all')" class="px-4 py-2 bg-gray-800 text-white rounded-lg font-bold text-sm hover:bg-gray-700">📋 সব</button>
        <button onclick="filterMembers('Pending')" class="px-4 py-2 bg-yellow-500 text-white rounded-lg font-bold text-sm hover:bg-yellow-400">⏳ Pending</button>
        <button onclick="filterMembers('Active')" class="px-4 py-2 bg-green-600 text-white rounded-lg font-bold text-sm hover:bg-green-500">✅ Active</button>
        <button onclick="filterMembers('Rejected')" class="px-4 py-2 bg-red-500 text-white rounded-lg font-bold text-sm hover:bg-red-400">❌ Rejected</button>
      </div>

      <!-- Members List -->
      <div id="members-list" class="space-y-4"></div>

      <div id="no-members" class="hidden text-center py-10">
        <div class="text-4xl mb-3">📭</div>
        <p class="text-gray-500">কোনো সদস্য পাওয়া যায়নি</p>
      </div>
    </div>
  </div>

  <footer class="bg-gray-900 text-white py-10 text-center">
    <div class="max-w-6xl mx-auto px-6">
      <h3 class="text-2xl font-bold text-yellow-400 mb-4">GSC Islamic Cultural Club</h3>
      <hr class="border-gray-700 mb-6">
      <p class="text-sm opacity-50">&copy; 2024 GSCICC | Developed by <span class="text-yellow-400">MD Samin Ismail</span></p>
    </div>
  </footer>

  <script src="firebase-config.js"></script>
  <script>
    // ⬇️ আপনার অ্যাডমিন পাসওয়ার্ড সেট করুন ⬇️
    var ADMIN_PASSWORD = 'GscIcc@Admin@321';
    // ⬆️ এটা পরিবর্তন করুন ⬆️

    var allMembers = [];

    emailjs.init('4McRUK1Y1iGOjnHZb');

    function adminLogin() {
      var pwd = document.getElementById('admin-password').value;
      if (pwd === ADMIN_PASSWORD) {
        document.getElementById('admin-login').classList.add('hidden');
        document.getElementById('admin-panel').classList.remove('hidden');
        loadMembers();
      } else {
        document.getElementById('admin-error').classList.remove('hidden');
        setTimeout(function() { document.getElementById('admin-error').classList.add('hidden'); }, 3000);
      }
    }

    // Enter key
    document.getElementById('admin-password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') adminLogin();
    });

    function loadMembers() {
      db.collection('members').orderBy('joinDate', 'desc').get().then(function(snapshot) {
        allMembers = [];
        var pending = 0, active = 0, rejected = 0;

        snapshot.forEach(function(doc) {
          var data = doc.data();
          data.docId = doc.id;
          allMembers.push(data);

          if (data.status === 'Pending') pending++;
          else if (data.status === 'Active') active++;
          else if (data.status === 'Rejected') rejected++;
        });

        document.getElementById('stat-pending').textContent = pending;
        document.getElementById('stat-active').textContent = active;
        document.getElementById('stat-rejected').textContent = rejected;
        document.getElementById('stat-total').textContent = allMembers.length;

        renderMembers(allMembers);
      });
    }

    function filterMembers(status) {
      if (status === 'all') { renderMembers(allMembers); return; }
      var filtered = allMembers.filter(function(m) { return m.status === status; });
      renderMembers(filtered);
    }

    function renderMembers(members) {
      var list = document.getElementById('members-list');
      var noMembers = document.getElementById('no-members');
      list.innerHTML = '';

      if (members.length === 0) { noMembers.classList.remove('hidden'); return; }
      noMembers.classList.add('hidden');

      members.forEach(function(m) {
        var statusBadge = '', actionBtns = '';

        if (m.status === 'Pending') {
          statusBadge = '<span class="px-3 py-1 bg-yellow-100 text-yellow-700 text-xs font-bold rounded-full">⏳ Pending</span>';
          actionBtns = '<button onclick="approveMember(\'' + m.docId + '\',\'' + m.email + '\',\'' + m.fullName + '\')" class="bg-green-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-green-500 transition-all">✅ Approve</button>' +
                       '<button onclick="rejectMember(\'' + m.docId + '\',\'' + m.email + '\',\'' + m.fullName + '\')" class="bg-red-500 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-400 transition-all">❌ Reject</button>';
        } else if (m.status === 'Active') {
          statusBadge = '<span class="px-3 py-1 bg-green-100 text-green-700 text-xs font-bold rounded-full">✅ Active</span>';
          actionBtns = '<button onclick="rejectMember(\'' + m.docId + '\',\'' + m.email + '\',\'' + m.fullName + '\')" class="bg-red-500 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-red-400">❌ Remove</button>';
        } else {
          statusBadge = '<span class="px-3 py-1 bg-red-100 text-red-700 text-xs font-bold rounded-full">❌ Rejected</span>';
          actionBtns = '<button onclick="approveMember(\'' + m.docId + '\',\'' + m.email + '\',\'' + m.fullName + '\')" class="bg-green-600 text-white px-3 py-2 rounded-lg text-xs font-bold hover:bg-green-500">✅ Approve</button>';
        }

        // Photo
        var photoHtml = '';
        if (m.profilePicture && m.profilePicture.length > 10) {
          photoHtml = '<img src="' + m.profilePicture + '" class="w-14 h-14 rounded-full object-cover border-2 border-yellow-400">';
        } else {
          var initial = m.fullName ? m.fullName.charAt(0).toUpperCase() : '?';
          photoHtml = '<div class="w-14 h-14 rounded-full bg-green-700 flex items-center justify-center text-xl font-bold text-yellow-400 border-2 border-yellow-400">' + initial + '</div>';
        }

        var joinDate = m.joinDate ? new Date(m.joinDate).toLocaleDateString('bn-BD') : '---';

        list.innerHTML += '<div class="bg-white rounded-xl shadow-md p-4 flex flex-col md:flex-row items-center gap-4 border-l-4 ' +
          (m.status === 'Pending' ? 'border-yellow-400' : m.status === 'Active' ? 'border-green-500' : 'border-red-400') + '">' +
          photoHtml +
          '<div class="flex-1 text-center md:text-left">' +
          '<h3 class="font-bold text-gray-800">' + (m.fullName || '---') + '</h3>' +
          '<p class="text-gray-500 text-xs">' + (m.email || '') + ' · ' + (m.department || '') + ' · ' + (m.session || '') + '</p>' +
          '<p class="text-gray-400 text-xs mt-1">📱 ' + (m.phone || '---') + ' · 🩸 ' + (m.bloodGroup || '---') + ' · 📅 ' + joinDate + '</p>' +
          '<div class="mt-2">' + statusBadge + ' <span class="text-xs text-gray-400 ml-2">ID: ' + (m.memberID || '---') + '</span></div>' +
          '</div>' +
          '<div class="flex gap-2">' + actionBtns + '</div></div>';
      });
    }

    function approveMember(docId, email, name) {
      if (!confirm('✅ ' + name + ' কে Approve করবেন?')) return;
      db.collection('members').doc(docId).update({ status: 'Active', approvedDate: new Date().toISOString() }).then(function() {
        // মেম্বারকে ইমেইল
        emailjs.send('service_244m0pm', 'template_v0lw5j9', {
          from_name: 'GSCICC Admin',
          from_email: 'gscicc26@gmail.com',
          message: '✅ অভিনন্দন ' + name + '!\n\nআপনার GSCICC সদস্যপদ অনুমোদিত হয়েছে। এখন আপনি লগইন করে ড্যাশবোর্ড ব্যবহার করতে পারবেন।\n\n🔗 Login: ' + window.location.origin + '/login.html'
        });
        alert('✅ ' + name + ' Approved!');
        loadMembers();
      });
    }

    function rejectMember(docId, email, name) {
      if (!confirm('❌ ' + name + ' কে Reject করবেন?')) return;
      db.collection('members').doc(docId).update({ status: 'Rejected' }).then(function() {
        alert('❌ ' + name + ' Rejected');
        loadMembers();
      });
    }

    function logOut() { auth.signOut().then(function() { window.location.href = 'login.html'; }); }

    var darkToggle = document.getElementById('darkToggle');
    if (localStorage.getItem('darkMode') === 'true') { document.body.classList.add('dark-mode'); darkToggle.textContent = '☀️'; }
    darkToggle.addEventListener('click', function() { document.body.classList.toggle('dark-mode'); var isDark = document.body.classList.contains('dark-mode'); darkToggle.textContent = isDark ? '☀️' : '🌙'; localStorage.setItem('darkMode', isDark); });
  </script>
</body>
</html>
